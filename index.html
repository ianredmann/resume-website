<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/resume-website/assets/favicon-COSPXzvM.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e1c1a" />
    <title>Ian Redman - Full Stack Developer and Data Analyst</title>
    <!-- Sets html background before any paint so Safari's overscroll/status
         bar area is dark by default. colorScheme inline style overrides any
         CSS color-scheme rule regardless of specificity. -->
    <style>html { background-color: #2a2825; }</style>
    <script>
      (function () {
        var light = localStorage.getItem('theme') === 'light';
        document.documentElement.style.colorScheme = light ? 'light' : 'dark';
        document.documentElement.style.backgroundColor = light ? '#f6f4ef' : '#2a2825';
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.setAttribute('content', light ? '#ede9e1' : '#1e1c1a');
      })();
    </script>
    <script type="module" crossorigin src="/resume-website/assets/index-C7TefOdw.js"></script>
    <link rel="stylesheet" crossorigin href="/resume-website/assets/index-DIRVKNSQ.css">
  </head>
  <body>
    <!-- Runs synchronously before React's first render so CSS vars resolve
         correctly and the glass navbar backdrop shows the right color. -->
    <script>
      if (localStorage.getItem('theme') !== 'light') {
        document.body.classList.add('dark-mode');
      }
    </script>
    <div id="root"></div>
  </body>
</html>
